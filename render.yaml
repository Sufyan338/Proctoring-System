# Render deployment configuration
# https://render.com/docs/render-yaml

services:
  - type: web
    name: proctor-ai-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn 'backend.app:create_app()' --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@proctor.local
      - key: ADMIN_PASSWORD
        value: Admin@12345
      # Uncomment and set DATABASE_URL for PostgreSQL
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: proctor-db
      #     property: connectionString

