[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[client]
showErrorDetails = true
logger.level = "info"

[logger]
level = "info"

[server]
port = 8501
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = false
headless = true

[browser]
gatherUsageStats = false

[runtime]
featureFlag.disableWatchDogOnNotification = true
